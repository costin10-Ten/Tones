  <line x1="0" y1="159" x2="800" y2="159" stroke="#1a0000" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="0" y1="212" x2="800" y2="212" stroke="#1a0000" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="0" y1="265" x2="800" y2="265" stroke="#1a0000" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Level labels -->
  <text x="12" y="78" font-family="monospace" font-size="8" fill="#909090">B05F</text>
