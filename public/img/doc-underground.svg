  <text x="12" y="312" font-family="monospace" font-size="8" fill="#8d0801" letter-spacing="1">[ ACCESS LEVEL: B17 AND BELOW REQUIRES CLEARANCE · ELEVATOR 3 OUT OF SERVICE ]</text>
